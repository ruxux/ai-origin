[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/vault"
  to = "/prompt-vault.html"
  status = 200

[[redirects]]
  from = "/art"
  to = "/index.html"
  status = 200
